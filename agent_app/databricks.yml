bundle:
  name: multi_agent_genie_app

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

include:
  - resources/*.yml

variables:
  # Canonical Unity Catalog settings
  catalog_name:
    default: "serverless_dbx_unifiedchat_catalog"
  schema_name:
    default: "multi_agent_genie"
  data_catalog_name:
    default: "healthverity_claims_sample_patient_dataset"
  data_schema_name:
    default: "hv_claims_sample"
  uc_function_names:
    default: "get_space_summary,get_table_overview,get_column_detail,get_space_instructions,get_space_details"

  # Canonical SQL warehouse setting
  sql_warehouse_id:
    default: "a4ed2ccbda385db9"

  # Lakebase
  lakebase_instance_name:
    default: "dbx-unifiedchat-state-db-${bundle.target}"
  lakebase_capacity:
    default: "CU_1"

  # MLflow experiment
  experiment_id:
    default: "1430933840630413"

  # LLM endpoints
  llm_endpoint:
    default: "databricks-gpt-5-4-mini"
  llm_endpoint_clarification:
    default: "databricks-gpt-5-4-mini"
  llm_endpoint_planning:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_sql_synthesis_table:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_sql_synthesis_genie:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_execution:
    default: "databricks-claude-haiku-4-5"
  llm_endpoint_summarize:
    default: "databricks-gpt-5-4"
  llm_endpoint_detect_code_lookup:
    default: "databricks-gpt-5-4-mini"

  # Embedding & vector search
  embedding_model:
    default: "databricks-gte-large-en"
  lakebase_embedding_dims:
    default: "1024"
  vs_endpoint_name:
    default: "genie_multi_agent_vs"
  pipeline_type:
    default: "TRIGGERED"

  # App runtime
  chat_proxy_timeout_seconds:
    default: "300"
  sample_size:
    default: "20"
  max_unique_values:
    default: "20"
  volume_name:
    default: "volume"
  enriched_docs_table:
    default: "enriched_genie_docs"
  source_table:
    default: "enriched_genie_docs_chunks"
  mlflow_tracking_uri:
    default: "databricks"
  mlflow_registry_uri:
    default: "databricks-uc"
  agent_prewarm_on_startup:
    default: "true"
  agent_prewarm_space_context:
    default: "true"
  agent_keep_warm_interval_seconds:
    default: "600"

  # Genie spaces
  # genie_space_id_1:
  #   default: "01f11b27d1121e2bb00d6ecd846b1988"
  # genie_space_id_2:
  #   default: "01f11b27d23a1ab195fa7ba8efc06d13"
  # genie_space_id_3:
  #   default: "01f11b27d3ea149694cf608c3d278673"
  genie_space_ids:
    default: "01f106e1239d14b28d6ab46f9c15e540,01f106e121e7173d8cf84bb80e842d6c,01f106e120b718e084598e92dcf14d4e"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: dev
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: "serverless_dbx_unifiedchat_dev_catalog"
      schema_name: "multi_agent_genie"
      data_catalog_name: "healthverity_claims_sample_patient_dataset_dev"
      data_schema_name: "hv_claims_sample"
      uc_function_names: "get_space_summary,get_table_overview,get_column_detail,get_space_instructions,get_space_details"
      experiment_id: "4357851413903846"
      agent_keep_warm_interval_seconds: "600"
      sql_warehouse_id: "32f4d1aae5fcf8ca"
      lakebase_instance_name: "multi-agent-genie-system-state-db-dev"
      lakebase_capacity: "CU_1"
      genie_space_ids: "01f11b27d1121e2bb00d6ecd846b1988,01f11b27d23a1ab195fa7ba8efc06d13,01f11b27d3ea149694cf608c3d278673"

  prod:
    mode: production
    workspace:
      profile: prod
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: "serverless_dbx_unifiedchat_catalog"
      schema_name: "multi_agent_genie"
      experiment_id: "2377237249204444"
      agent_keep_warm_interval_seconds: "600"
      # sql_warehouse_id: "<prod-warehouse-id>"
      # Override these per-environment as needed:
      # genie_space_id_1: "<prod-space-id>"
      # genie_space_id_2: "<prod-space-id>"
      # genie_space_id_3: "<prod-space-id>"
      # genie_space_ids: "<comma-separated-prod-ids>"

sync:
  paths:
    - .
    - ../etl
