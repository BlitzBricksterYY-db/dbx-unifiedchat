bundle:
  name: multi_agent_genie_app

include:
  - resources/*.yml

variables:
  # Unity Catalog
  catalog:
    default: "serverless_dbx_unifiedchat_dev_catalog"
  schema:
    default: "multi_agent_genie"

  # SQL warehouse
  warehouse_id:
    default: "32f4d1aae5fcf8ca"

  # Lakebase
  lakebase_capacity:
    default: "CU_1"

  # MLflow experiment
  experiment_id:
    default: "4357851413903846"

  # LLM endpoints
  llm_endpoint:
    default: "databricks-gpt-5-4-mini"
  llm_endpoint_clarification:
    default: "databricks-gpt-5-4-mini"
  llm_endpoint_planning:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_sql_synthesis_table:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_sql_synthesis_genie:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_execution:
    default: "databricks-claude-haiku-4-5"
  llm_endpoint_summarize:
    default: "databricks-gpt-5-4"
  llm_endpoint_detect_code_lookup:
    default: "databricks-gpt-5-4-mini"

  # Embedding & vector search
  embedding_model:
    default: "databricks-gte-large-en"
  vs_endpoint_name:
    default: "genie_multi_agent_vs"

  # Genie spaces
  genie_space_id_1:
    default: "01f11b27d1121e2bb00d6ecd846b1988"
  genie_space_id_2:
    default: "01f11b27d23a1ab195fa7ba8efc06d13"
  genie_space_id_3:
    default: "01f11b27d3ea149694cf608c3d278673"
  genie_space_ids:
    default: "01f11b27d1121e2bb00d6ecd846b1988,01f11b27d23a1ab195fa7ba8efc06d13,01f11b27d3ea149694cf608c3d278673"

targets:
  dev:
    default: true
    mode: development

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/yang.yang@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "serverless_dbx_unifiedchat_prod_catalog"
      # Override these per-environment as needed:
      # warehouse_id: "<prod-warehouse-id>"
      # experiment_id: "<prod-experiment-id>"
      # genie_space_id_1: "<prod-space-id>"
      # genie_space_id_2: "<prod-space-id>"
      # genie_space_id_3: "<prod-space-id>"
      # genie_space_ids: "<comma-separated-prod-ids>"
