bundle:
  name: multi_agent_genie_app

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

include:
  - resources/*.yml

variables:
  # Public-safe baseline only.
  # Replace these placeholders in this file before local dev or bundle deploy.
  # Keep your private working values in `databricks.local.yml` (gitignored) and
  # manually copy the relevant values back here when needed.

  # Canonical Unity Catalog settings
  catalog_name:
    default: "<shared-catalog-name>"
  schema_name:
    default: "<shared-schema-name>"
  data_catalog_name:
    default: "<shared-data-catalog-name>"
  data_schema_name:
    default: "<shared-data-schema-name>"
  uc_function_names:
    default: "get_space_summary,get_table_overview,get_column_detail,get_space_instructions,get_space_details"

  # Canonical SQL warehouse setting
  # Common override: replace per workspace/environment.
  sql_warehouse_id:
    default: "<shared-sql-warehouse-id>"

  # Autoscaling Lakebase project
  # Lakebase
  lakebase_project:
    default: "<shared-lakebase-project-${bundle.target}>"
  lakebase_pg_version:
    default: "17"
  lakebase_branch:
    # Runtime/app target branch. The bundle resource file only declares the
    # project directly; `production` is auto-created, and any non-default
    # branch should be paired with an explicit endpoint resource.
    default: "production"

  # MLflow experiment
  # Common override: replace when routing feedback to a different experiment.
  experiment_id:
    default: "<shared-mlflow-experiment-id>"

  # LLM endpoints
  llm_endpoint:
    default: "databricks-gpt-5-4-mini"
  llm_endpoint_clarification:
    default: "databricks-gpt-5-4-mini"
  llm_endpoint_planning:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_sql_synthesis_table:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_sql_synthesis_genie:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_execution:
    default: "databricks-claude-haiku-4-5"
  llm_endpoint_summarize:
    default: "databricks-gpt-5-4"
  llm_endpoint_detect_code_lookup:
    default: "databricks-gpt-5-4-mini"

  # Embedding & vector search
  embedding_model:
    default: "databricks-gte-large-en"
  lakebase_embedding_dims:
    default: "1024"
  vs_endpoint_name:
    default: "genie_multi_agent_vs"
  pipeline_type:
    default: "TRIGGERED"

  # App runtime
  # Common override: rename per environment if needed.
  app_name:
    default: "<app-name-${bundle.target}>"
  # Common override: branding/logo shown in the UI greeting screen.
  app_logo_url:
    default: "https://raw.githubusercontent.com/databricks-solutions/dbx-unifiedchat/main/docs/logos/dbx-unifiedchat-logo-pacman-eating-data.png"
  chat_proxy_timeout_seconds:
    default: "300"
  sample_size:
    default: "20"
  max_unique_values:
    default: "20"
  volume_name:
    default: "volume"
  enriched_docs_table:
    default: "enriched_genie_docs"
  source_table:
    default: "enriched_genie_docs_chunks"
  mlflow_tracking_uri:
    default: "databricks"
  mlflow_registry_uri:
    default: "databricks-uc"
  agent_prewarm_on_startup:
    default: "true"
  agent_prewarm_space_context:
    default: "true"
  agent_keep_warm_interval_seconds:
    default: "600"

  # Genie spaces
  # Common override: set this to the comma-separated Genie spaces for the target.
  genie_space_ids:
    default: "<comma-separated-genie-space-ids>"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: "<dev-profile>"
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: "<dev-catalog-name>"
      schema_name: "<dev-schema-name>"
      data_catalog_name: "<dev-data-catalog-name>"
      data_schema_name: "<dev-data-schema-name>"
      uc_function_names: "<dev-comma-separated-uc-function-names>"
      experiment_id: "<dev-mlflow-experiment-id>"
      agent_keep_warm_interval_seconds: "600"
      sql_warehouse_id: "<dev-sql-warehouse-id>"
      lakebase_project: "<dev-lakebase-project>"
      lakebase_branch: "production"
      genie_space_ids: "<dev-comma-separated-genie-space-ids>"

  prod:
    default: false
    mode: production
    workspace:
      profile: "<prod-profile>"
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      # Common production overrides - replace only what differs from the shared defaults.
      # app_name: "your-app-name-prod"
      # app_logo_url: "https://example.com/path/to/your-logo.png"
      catalog_name: "<prod-catalog-name>"
      schema_name: "<prod-schema-name>"
      data_catalog_name: "<prod-data-catalog>"
      data_schema_name: "<prod-data-schema>"
      experiment_id: "<prod-mlflow-experiment-id>"
      agent_keep_warm_interval_seconds: "600"
      lakebase_project: "<prod-lakebase-project>"
      lakebase_branch: "production"
      sql_warehouse_id: "<prod-warehouse-id>"
      genie_space_ids: "<prod-comma-separated-genie-space-ids>"

sync:
  paths:
    - .
    - ../etl
