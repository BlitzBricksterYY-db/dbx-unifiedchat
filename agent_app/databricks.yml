bundle:
  name: multi_agent_genie_app

include:
  - resources/*.yml

variables:
  # Unity Catalog
  catalog:
    default: "databricks_c3od_poc"
  schema:
    default: "multi_agent_genie"
  data_catalog:
    default: "genie"
  data_schema:
    default: "dbo"
  uc_function_names:
    default: "get_space_summary,get_table_overview,get_column_detail,get_space_instructions,get_space_details"

  # SQL warehouse
  warehouse_id:
    default: "cca0b29ed7524730"

  # Lakebase
  lakebase_instance_name:
    default: "multi-agent-genie-system-state-db-${bundle.target}"
  lakebase_capacity:
    default: "CU_1"

  # MLflow experiment
  experiment_id:
    default: "1512532220879769"

  # LLM endpoints
  llm_endpoint:
    default: "databricks-claude-haiku-4-5"
  llm_endpoint_clarification:
    default: "databricks-claude-haiku-4-5"
  llm_endpoint_planning:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_sql_synthesis_table:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_sql_synthesis_genie:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_execution:
    default: "databricks-claude-haiku-4-5"
  llm_endpoint_summarize:
    default: "databricks-claude-sonnet-4-5"
  llm_endpoint_detect_code_lookup:
    default: "databricks-claude-haiku-4-5"

  # Embedding & vector search
  embedding_model:
    default: "databricks-gte-large-en"
  lakebase_embedding_dims:
    default: "1024"
  vs_endpoint_name:
    default: "genie_multi_agent_vs"

  # App runtime
  chat_proxy_timeout_seconds:
    default: "300"
  sample_size:
    default: "20"
  max_unique_values:
    default: "20"
  volume_name:
    default: "volume"
  enriched_docs_table:
    default: "enriched_genie_docs"
  source_table:
    default: "enriched_genie_docs_chunks"
  mlflow_tracking_uri:
    default: "databricks"
  mlflow_registry_uri:
    default: "databricks-uc"

  # Genie spaces
  genie_space_id_1:
    default: "01f072dbd668159d99934dfd3b17f544"
  genie_space_id_2:
    default: "01f08f4d1f5f172ea825ec8c9a3c6064"
  genie_space_id_3:
    default: "01f073c5476313fe8f51966e3ce85bd7"
  genie_space_id_4:
    default: "01f07795f6981dc4a99d62c9fc7c2caa"
  genie_space_id_5:
    default: "01f08a9fd9ca125a986d01c1a7a5b2fe"
  genie_space_ids:
    default: "01f072dbd668159d99934dfd3b17f544,01f08f4d1f5f172ea825ec8c9a3c6064,01f073c5476313fe8f51966e3ce85bd7,01f07795f6981dc4a99d62c9fc7c2caa,01f08a9fd9ca125a986d01c1a7a5b2fe"

targets:
  dev:
    default: false
    mode: development
    workspace:
      profile: dev

  prod:
    default: true
    mode: production
    workspace:
      profile: prod
      root_path: /Workspace/Users/yang.yang@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "serverless_dbx_unifiedchat_catalog"
      experiment_id: "2377237249204444"
      # Override these per-environment as needed:
      # warehouse_id: "<prod-warehouse-id>"
      # genie_space_id_1: "<prod-space-id>"
      # genie_space_id_2: "<prod-space-id>"
      # genie_space_id_3: "<prod-space-id>"
      # genie_space_ids: "<comma-separated-prod-ids>"

sync:
  exclude:
    - ./.venv/**
    - ./.databricks/**
