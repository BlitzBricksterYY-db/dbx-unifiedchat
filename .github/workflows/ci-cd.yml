name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Sync app dependencies
        working-directory: agent_app
        run: |
          uv sync --dev
      - name: Run app tests
        working-directory: agent_app
        run: uv run pytest tests/ -v

  validate-bundle:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - uses: databricks/setup-cli@main
      - name: Validate app bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        working-directory: agent_app
        run: databricks bundle validate -t dev

  deploy-dev:
    needs: validate-bundle
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - uses: databricks/setup-cli@main
      - name: Deploy app bundle to Dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        working-directory: agent_app
        run: ./scripts/deploy.sh --target dev --full-deploy --run --ci --skip-bootstrap

  deploy-prod:
    needs: validate-bundle
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - uses: databricks/setup-cli@main
      - name: Deploy app bundle to Production
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}
        working-directory: agent_app
        run: ./scripts/deploy.sh --target prod --full-deploy --run --ci --skip-bootstrap
